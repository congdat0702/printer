version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: printer_app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=vo9caihgz8ve_nguyendatdev
      - DB_USERNAME=vo9caihgz8ve_nguyendatdev
      - DB_PASSWORD=vo9caihgz8ve_nguyendatdev
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
    depends_on:
      - db
    # Bạn có thể bật 2 dòng dưới nếu muốn map thư mục local trực tiếp (dành cho Dev)
    # volumes:
    #   - .:/var/www/html

  db:
    image: mysql:8.0
    container_name: printer_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: vo9caihgz8ve_nguyendatdev
      MYSQL_USER: vo9caihgz8ve_nguyendatdev
      MYSQL_PASSWORD: vo9caihgz8ve_nguyendatdev
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql
      # Nếu có file database backup ở hiện tại chứa sẵn cấu trúc, bạn bỏ comment để nó tự import
      # - ./vo9caihgz8ve_nguyendatdev.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: printer_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: vo9caihgz8ve_nguyendatdev
      PMA_PASSWORD: vo9caihgz8ve_nguyendatdev
    depends_on:
      - db

volumes:
  dbdata:
